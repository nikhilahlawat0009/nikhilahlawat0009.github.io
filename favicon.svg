<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <style>
      .monogram {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 110px;
        font-weight: 800;
        letter-spacing: -2px;
        fill: url(#grad);
      }
      .ring {
        fill: none;
        stroke: url(#grad);
        opacity: 0.4;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0e27" rx="40"/>
  
  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="95" class="ring" stroke-width="2"/>
  <circle cx="100" cy="100" r="80" class="ring" stroke-width="1" opacity="0.2"/>
  
  <!-- Corner accents for tech feel -->
  <line x1="20" y1="20" x2="40" y2="20" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="20" x2="20" y2="40" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  
  <line x1="180" y1="20" x2="160" y2="20" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="20" x2="180" y2="40" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  
  <line x1="20" y1="180" x2="40" y2="180" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="180" x2="20" y2="160" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  
  <line x1="180" y1="180" x2="160" y2="180" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="180" x2="180" y2="160" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Monogram -->
  <text x="100" y="135" class="monogram" text-anchor="middle" filter="url(#shadow)">NA</text>
</svg>
